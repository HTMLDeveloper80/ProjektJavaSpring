server.port=8080
spring.application.name=fitness-gym-api-spring
fitcore.dotnet-api.base-url=http://localhost:5080/api/fitness

spring.datasource.url=jdbc:h2:file:./data/fitcore-db;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

fitcore.jwt.secret=${FITCORE_JWT_SECRET:Zml0Y29yZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1iZWZvcmUtcHJvZA==}
fitcore.jwt.access-token-minutes=15
fitcore.jwt.refresh-token-days=7
fitcore.auth.demo-password=${FITCORE_DEMO_PASSWORD:demo123}
